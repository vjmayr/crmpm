{% extends "base.html" %}

{% block title %}Leads — CRMPM{% endblock %}

{% block content %}
<h1 class="text-2xl font-semibold text-gray-900 mb-6">Leads</h1>

<form
    class="mb-4 flex flex-wrap items-end gap-4"
    hx-get="{{ url_for('crm.lead_list') }}"
    hx-target="#lead-table"
    hx-swap="innerHTML"
    hx-trigger="change, keyup changed delay:300ms from:input[name=search]"
>
    <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Search</label>
        <input type="text" name="search" value="{{ search }}" placeholder="Person or organization…"
            class="rounded border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Status</label>
        <select name="status" class="rounded border border-gray-300 px-3 py-2 text-sm">
            <option value="">All</option>
            {% for s in statuses %}
            <option value="{{ s.value }}" {{ "selected" if status == s.value else "" }}>{{ s.value.replace("_", " ").title() }}</option>
            {% endfor %}
        </select>
    </div>
</form>

<div id="lead-table">
    {% include "crm/partials/_lead_table.html" %}
</div>
{% endblock %}
