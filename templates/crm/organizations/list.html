{% extends "base.html" %}

{% block title %}Organizations — CRMPM{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-semibold text-gray-900">Organizations</h1>
    <a href="{{ url_for('crm.organization_create') }}" class="rounded bg-blue-600 text-white text-sm font-medium px-4 py-2 hover:bg-blue-700">New organization</a>
</div>

<input
    type="text"
    name="search"
    value="{{ search }}"
    placeholder="Search by name…"
    class="mb-4 w-full max-w-sm rounded border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
    hx-get="{{ url_for('crm.organization_list') }}"
    hx-target="#organization-table"
    hx-trigger="keyup changed delay:300ms"
    hx-swap="innerHTML"
>

<div id="organization-table">
    {% include "crm/partials/_organization_table.html" %}
</div>
{% endblock %}
