<table class="min-w-full divide-y divide-gray-200">
    <thead>
        <tr class="text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">
            <th class="py-2 pr-4">Name</th>
            <th class="py-2 pr-4">Email</th>
            <th class="py-2 pr-4">Organization</th>
            <th class="py-2 pr-4">Qualification</th>
            <th class="py-2 pr-4">Contact permission</th>
        </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
        {% for person in people %}
            {% include "crm/partials/_person_row.html" %}
        {% else %}
        <tr>
            <td colspan="5" class="py-6 text-sm text-gray-400">
                No people found — <a href="{{ url_for('crm.person_create') }}" class="text-blue-600 hover:underline">add the first person</a>.
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
